name: Release

# Fires when you publish a GitHub release (Releases → Draft/publish, or `gh release create`).
# Each job builds an asset and attaches it to that release with `gh release upload`, so the
# binaries land automatically — no manual download-and-attach. `workflow_dispatch` lets you
# backfill assets onto an existing tag (e.g. the already-published v0.1.0).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach assets to"
        required: true

permissions:
  contents: write          # gh release upload writes assets onto the release

env:
  TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  # Native single-file binaries — instant start, no JVM needed. One per OS/arch the runners give us.
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: jcma-linux-amd64
          - os: macos-latest
            asset: jcma-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}    # build from the tagged commit, not the default branch
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'gradle'
      - name: Build native image
        run: ./gradlew nativeCompile --no-daemon
      - name: Stage binary
        run: cp build/native/nativeCompile/jcma ${{ matrix.asset }}
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" ${{ matrix.asset }} --clobber

  # JVM fallback — `bin/jcma` (POSIX) + `bin/jcma.bat` (Windows) + lib/*.jar. Runs anywhere a
  # JDK 25+ does (Windows, other arches), trading native instant-start for portability.
  jvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'gradle'
      - name: Build JVM distribution
        run: ./gradlew distZip --no-daemon
      - name: Stage distribution
        run: cp build/distributions/*.zip jcma-jvm.zip
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" jcma-jvm.zip --clobber
